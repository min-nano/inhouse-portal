name: Deploy GAS (clasp)

# gas/ 配下の変更を単一 Apps Script プロジェクトへ push し、デプロイまで行う。
# 認証情報・スクリプトIDはリポジトリに置かず、すべて GitHub Secrets から注入する
# (コミット済みの *.example はプレースホルダのみ)。
on:
  push:
    branches: [main]
    paths:
      - "gas/**"
      - ".github/workflows/gas-deploy.yml"
  workflow_dispatch:

# 同時実行を1本に絞り、デプロイの競合を避ける。
concurrency:
  group: gas-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 実設定ファイルを生成する。生成物 (.clasp.json / .clasprc.json) は
      # .gitignore 済みでコミットされない。
      #   - .clasp.json  : scriptId だけプレースホルダ置換で埋める
      #   - .clasprc.json: `clasp login` で作られる ~/.clasprc.json を丸ごと登録した
      #                    シークレットを、そのままファイルとして書き出す
      - name: Materialize clasp config from secrets
        env:
          CLASP_SCRIPT_ID: ${{ secrets.CLASP_SCRIPT_ID }}
          CLASP_CREDENTIALS: ${{ secrets.CLASP_CREDENTIALS }}
        run: |
          if [ -z "$CLASP_CREDENTIALS" ]; then
            echo "::error::Secret CLASP_CREDENTIALS is not set (paste the whole ~/.clasprc.json)."
            exit 1
          fi
          node scripts/render-template.mjs gas/.clasp.json.example gas/.clasp.json
          printf '%s' "$CLASP_CREDENTIALS" > gas/.clasprc.json
          # 壊れた JSON をそのまま push しないよう軽く検証する。
          node -e "JSON.parse(require('fs').readFileSync('gas/.clasprc.json','utf8'))" \
            || { echo "::error::CLASP_CREDENTIALS is not valid JSON."; exit 1; }

      - name: Push source to Apps Script
        run: npx clasp push --force --project gas --auth gas/.clasprc.json

      # 既存デプロイIDを更新する(新規作成しない)ことで /exec URL を固定する。
      # redeploy は versionNumber 省略時に新バージョンを作り、その版へ同じデプロイを
      # 差し替える(URL 不変)。デプロイIDは初回に一度だけ作成して Secret に登録する。
      - name: Redeploy to the fixed deployment (stable URL)
        env:
          CLASP_DEPLOYMENT_ID: ${{ secrets.CLASP_DEPLOYMENT_ID }}
        run: |
          if [ -z "$CLASP_DEPLOYMENT_ID" ]; then
            echo "::error::Secret CLASP_DEPLOYMENT_ID is not set (create one deployment once, then register its id)."
            exit 1
          fi
          npx clasp redeploy "$CLASP_DEPLOYMENT_ID" \
            --project gas \
            --auth gas/.clasprc.json \
            --description "CI ${GITHUB_SHA::7} @ ${GITHUB_REF_NAME}"

      # ジョブが失敗しても認証ファイルを残さない。
      - name: Clean up credentials
        if: always()
        run: rm -f gas/.clasp.json gas/.clasprc.json
