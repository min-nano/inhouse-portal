name: Post-deploy smoke (auth gate)

# デプロイ後に「認証がかかっていること」を外形で検証する。
# 未認証アクセスが弾かれること + Zero Trust(Cloudflare Access)を偽装した
# ヘッダでも素通りしないことを確認する。本番とプレビューで認証モデルが違うため
# scripts/smoke.mjs をモード分けして実行する(本番=厳密ステータス / プレビュー=ブロック確認)。
#
# トリガー: Cloudflare Pages はデプロイ結果を GitHub の **Check Run** で通知する
# (GitHub App "cloudflare-workers-and-pages" が "Cloudflare Pages" という check run を発行)。
# その完了(success)を check_run イベントで受けて発火する。wrangler direct-upload は
# Deployments API を使わないため deployment_status は飛ばないが、この check run は付く。
#
# 検査対象URL(本番固定ドメイン / デプロイ毎のユニークURL / ブランチエイリアス)は
# Cloudflare Pages API(scripts/cf-deploy-urls.mjs)から head_sha で解決する。

on:
  check_run:
    types: [completed]
  # 手動実行(URL とモードを上書き可能)
  workflow_dispatch:
    inputs:
      urls:
        description: "検査する base URL(カンマ区切り)。空なら API / SMOKE_BASE_URLS を使う"
        required: false
        default: ""
      mode:
        description: "production / preview"
        required: false
        default: "production"

permissions:
  contents: read
  # 検査結果を「トリガー元ブランチのコミット」に commit status として投稿するのに必要。
  # (check_run 起動のこの実行自体は main の実行として扱われ、その check run は main の
  #  コミットに付くため、ブランチ/PR のチェック欄には出ない。head_sha へ明示投稿する。)
  statuses: write

# 本番デプロイの検査は最新1本だけ走れば十分(古い実行はキャンセル)。
concurrency:
  group: post-deploy-smoke-${{ github.event.check_run.head_sha || github.run_id }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    # 手動実行、または Cloudflare Pages の check run が success で完了したときだけ。
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.check_run.name == 'Cloudflare Pages' &&
       github.event.check_run.app.slug == 'cloudflare-workers-and-pages' &&
       github.event.check_run.conclusion == 'success')
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      # 検査開始をブランチのコミットへ pending として通知(チェック欄に「実行中」を出す)。
      - name: Post pending status to branch commit
        if: github.event_name == 'check_run'
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.event.check_run.head_sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          jq -nc --arg u "$RUN_URL" \
            '{state:"pending",context:"auth-smoke",description:"認証チェックを実行中",target_url:$u}' \
          | curl -sS -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/statuses/$SHA" -d @- >/dev/null

      - name: Resolve target and mode
        id: target
        env:
          # 本番の固定検査対象。通常は Cloudflare API(Project の domains)から取得するので
          # 設定不要。API を使わない/補助したい場合のみ Variables に設定する。
          SMOKE_BASE_URLS: ${{ vars.SMOKE_BASE_URLS }}
          # 本番ブランチ(既定 main)。この Check Run の head_branch がこれなら production。
          PRODUCTION_BRANCH: ${{ vars.PRODUCTION_BRANCH || 'main' }}
          DISPATCH_URLS: ${{ github.event.inputs.urls }}
          DISPATCH_MODE: ${{ github.event.inputs.mode }}
          EVENT: ${{ github.event_name }}
          HEAD_BRANCH: ${{ github.event.check_run.check_suite.head_branch }}
          HEAD_SHA: ${{ github.event.check_run.head_sha }}
          # Cloudflare Pages の check run 詳細URL(例:
          #   https://dash.cloudflare.com/?to=/<account>/pages/view/<project>/<deployment>)。
          # Pages プロジェクト名は GitHub リポジトリ名と一致しないことがある(このリポジトリでは
          # repo=inhouse-portal だが Pages プロジェクトは min-nano-private)。この構造化URLの
          # /pages/view/<project>/ から拾う。見出し(output.title)は完了時に
          # "Deployed successfully" へ変わりプロジェクト名が消えるため使わない。
          CHECK_DETAILS_URL: ${{ github.event.check_run.details_url }}
          # 明示指定(最優先)。details_url の形式変更に依存したくない場合に Variables で設定する。
          PROJECT_VAR: ${{ vars.CF_PAGES_PROJECT }}
        run: |
          if [ "$EVENT" = "workflow_dispatch" ]; then
            mode="${DISPATCH_MODE:-production}"
            base="$DISPATCH_URLS"
            sha=""
          else
            # check_run: head_branch が本番ブランチなら production、それ以外は preview。
            if [ "$HEAD_BRANCH" = "$PRODUCTION_BRANCH" ]; then mode="production"; else mode="preview"; fi
            base=""
            sha="$HEAD_SHA"
          fi
          # 本番で base が空なら SMOKE_BASE_URLS をフォールバックに足す(任意設定)。
          if [ "$mode" = "production" ] && [ -z "$base" ]; then base="$SMOKE_BASE_URLS"; fi
          # API 解決用の env(Cloudflare の env フィルタは production / preview の2値)
          if [ "$mode" = "production" ]; then cf_env="production"; else cf_env="preview"; fi
          # Pages プロジェクト名を解決する。優先順位:
          #   1) 変数 CF_PAGES_PROJECT(明示・最優先)
          #   2) check run 詳細URLの /pages/view/<project>/ から抽出(Cloudflare のデプロイ通知)
          # リポジトリ名は既定にしない(実プロジェクト名と異なることがあり、誤った 404 を招くため)。
          project="$PROJECT_VAR"
          if [ -z "$project" ] && [ -n "$CHECK_DETAILS_URL" ]; then
            project="$(printf '%s' "$CHECK_DETAILS_URL" \
              | sed -n 's#.*/pages/view/\([^/?]\{1,\}\).*#\1#p')"
          fi
          echo "Pages プロジェクト名: '${project:-(未解決)}'(details_url='${CHECK_DETAILS_URL}', 変数=${PROJECT_VAR:-未設定})"
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "cf_env=$cf_env" >> "$GITHUB_OUTPUT"
          echo "base=$base" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "project=$project" >> "$GITHUB_OUTPUT"

      - name: Resolve deploy URLs from Cloudflare API
        id: cfurls
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # プロジェクト名は Resolve target and mode で解決済み(変数 or check run 見出し)。
          # 空なら cf-deploy-urls.mjs 側で解決をスキップし、フォールバックに委ねる。
          CF_PAGES_PROJECT: ${{ steps.target.outputs.project }}
          COMMIT_SHA: ${{ steps.target.outputs.sha }}
          DEPLOY_ENV: ${{ steps.target.outputs.cf_env }}
        run: |
          # 失敗しても exit 0 で空を返す(本命のスモークは落とさない)。改行→カンマに畳む。
          resolved="$(node scripts/cf-deploy-urls.mjs || true)"
          echo "urls=$(printf '%s' "$resolved" | paste -sd, -)" >> "$GITHUB_OUTPUT"
          [ -n "$resolved" ] && echo "APIで解決したURL: $resolved" || echo "APIからの解決なし(フォールバックを使用)"

      - name: Run smoke test
        env:
          MODE: ${{ steps.target.outputs.mode }}
          BASE_URLS: ${{ steps.target.outputs.base }}
          API_URLS: ${{ steps.cfurls.outputs.urls }}
        run: |
          # 固定分 + API解決分をまとめて渡す(smoke.mjs 側で空要素除去・重複除去)。
          all="$(printf '%s,%s' "$BASE_URLS" "$API_URLS" | sed 's/^,//; s/,$//')"
          if [ -z "$all" ] || [ "$all" = "," ]; then
            echo "検査対象URLが1件も解決できませんでした。" >&2
            echo "前ステップ「Resolve deploy URLs from Cloudflare API」の cf-deploy-urls 警告を確認してください。" >&2
            echo "- HTTP 404 の場合: API トークンに Account→Cloudflare Pages(Read 以上)権限が無い、" >&2
            echo "  もしくは CLOUDFLARE_ACCOUNT_ID / プロジェクト名がトークンのアカウントと不一致です。" >&2
            echo "  (Secrets 未登録ではなく『登録済みだが権限/値が不適切』のことが多い)" >&2
            echo "- Secrets 自体を使わず固定URLで検査する場合は 変数 SMOKE_BASE_URLS を設定してください。" >&2
            exit 2
          fi
          echo "検査モード: $MODE / 対象: $all"
          if [ "$MODE" = "preview" ]; then
            node scripts/smoke.mjs --preview "$all"
          else
            node scripts/smoke.mjs "$all"
          fi

      # 検査結果をブランチのコミットへ commit status として投稿(PR/ブランチのチェック欄に表示)。
      - name: Post result status to branch commit
        if: always() && github.event_name == 'check_run'
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.event.check_run.head_sha }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          case "$JOB_STATUS" in
            success) state=success; desc="認証チェック合格" ;;
            failure) state=failure; desc="認証チェック不合格" ;;
            *)       state=error;   desc="認証チェック中断 ($JOB_STATUS)" ;;
          esac
          jq -nc --arg s "$state" --arg d "$desc" --arg u "$RUN_URL" \
            '{state:$s,context:"auth-smoke",description:$d,target_url:$u}' \
          | curl -sS -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/statuses/$SHA" -d @- >/dev/null
