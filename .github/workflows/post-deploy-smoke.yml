name: Post-deploy smoke (auth gate)

# デプロイ後に「認証がかかっていること」を外形で検証する。
# 未認証アクセスが弾かれること + Zero Trust(Cloudflare Access)を偽装した
# ヘッダでも素通りしないことを確認する。本番とプレビューで認証モデルが違うため
# scripts/smoke.mjs をモード分けして実行する(本番=厳密ステータス / プレビュー=ブロック確認)。

on:
  # Cloudflare Pages のデプロイ完了で発火(Pages は本番・プレビュー両方に
  # GitHub Deployment を作る)。
  deployment_status:
  # 手動実行(URL とモードを上書き可能)
  workflow_dispatch:
    inputs:
      urls:
        description: "検査する base URL(カンマ区切り)。空なら SMOKE_BASE_URLS を使う"
        required: false
        default: ""
      mode:
        description: "production / preview"
        required: false
        default: "production"

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    # deployment_status のときは成功時のみ実行する。
    if: >-
      github.event_name != 'deployment_status' ||
      github.event.deployment_status.state == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve target and mode
        id: target
        env:
          # 本番の検査対象。カスタムドメインと(あれば)pages.dev エイリアスを
          # カンマ区切りで設定。Settings → Secrets and variables → Actions → Variables。
          SMOKE_BASE_URLS: ${{ vars.SMOKE_BASE_URLS }}
          DISPATCH_URLS: ${{ github.event.inputs.urls }}
          DISPATCH_MODE: ${{ github.event.inputs.mode }}
          EVENT: ${{ github.event_name }}
          DEPLOY_ENV: ${{ github.event.deployment_status.environment }}
          EVENT_URL: ${{ github.event.deployment_status.environment_url }}
        run: |
          if [ "$EVENT" = "workflow_dispatch" ]; then
            mode="${DISPATCH_MODE:-production}"
            if [ "$mode" = "preview" ]; then
              urls="$DISPATCH_URLS"
            else
              urls="${DISPATCH_URLS:-$SMOKE_BASE_URLS}"
            fi
          else
            # deployment_status: environment に "production" を含めば本番、
            # それ以外(preview / ブランチ名)はプレビュー扱い。
            case "$(printf '%s' "$DEPLOY_ENV" | tr '[:upper:]' '[:lower:]')" in
              *production*) mode="production"; urls="${SMOKE_BASE_URLS:-$EVENT_URL}" ;;
              *)            mode="preview";    urls="$EVENT_URL" ;;
            esac
          fi

          if [ -z "$urls" ]; then
            if [ "$mode" = "production" ]; then
              echo "本番の検査対象URLが未設定です。リポジトリ変数 SMOKE_BASE_URLS を設定してください。" >&2
            else
              echo "プレビューURL(environment_url)が取得できませんでした。" >&2
            fi
            exit 2
          fi
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "urls=$urls" >> "$GITHUB_OUTPUT"
          echo "検査モード: $mode / 対象: $urls"

      - name: Run smoke test
        run: |
          if [ "${{ steps.target.outputs.mode }}" = "preview" ]; then
            node scripts/smoke.mjs --preview "${{ steps.target.outputs.urls }}"
          else
            node scripts/smoke.mjs "${{ steps.target.outputs.urls }}"
          fi
