name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# code-quality: write はカバレッジレポートのアップロードに必要。
permissions:
  contents: read
  code-quality: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # マージコミットではなくPR head commitをチェックアウトし、
          # カバレッジの行番号が差分に正しく対応するようにする。
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-code-coverage@v1
        with:
          file: coverage/cobertura-coverage.xml
          language: TypeScript
          label: code-coverage/vitest

      - name: Build (frontend)
        run: npm run build

      - name: Validate Pages Functions bundle
        run: npx wrangler pages functions build --outdir=dist/functions
