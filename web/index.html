<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>社内ポータル</title>
    <link rel="stylesheet" href="/style.css" />
    <script type="module" src="/main.ts"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="site-header-main">
        <h1>社内ポータル</h1>
        <p class="subtitle">設計ツール・GASアプリ リンク集</p>
      </div>
      <div id="user" class="user" hidden>
        <span id="user-email" class="user-email"></span>
        <a
          id="drive-connect"
          class="drive-connect"
          href="/api/registry/connect?redirect=/"
          hidden
          >Google Driveと連携</a
        >
        <button id="drive-disconnect" class="drive-disconnect" type="button" hidden>
          Drive連携を解除
        </button>
        <a class="logout" href="/api/auth/logout">ログアウト</a>
      </div>
    </header>

    <main>
      <div class="toolbar">
        <input
          id="search"
          type="search"
          placeholder="ツール名・説明・タグで検索"
          autocomplete="off"
        />
        <nav id="categories" class="categories" aria-label="カテゴリ"></nav>
      </div>

      <p id="status" class="status" hidden></p>
      <section id="apps" class="app-grid" aria-live="polite"></section>
    </main>

    <footer class="site-footer">
      <p>アプリの追加・修正はリポジトリの <code>data/apps.json</code> を編集してください。</p>
    </footer>
  </body>
</html>
